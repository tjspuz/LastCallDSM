name: Discover Open Venues

on:
  schedule:
    # Weekly, Monday 09:10 UTC — Overpass etiquette: don't hammer the API.
    - cron: "10 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install optional dependencies
        run: |
          pip install anthropic

      - name: Refresh open-venue catalog from OpenStreetMap
        run: |
          python3 scripts/discover_open_venues.py

      - name: Apply status lifecycle transitions
        run: |
          python3 scripts/update_statuses.py

      - name: Enrich venue descriptions
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 scripts/enrich_descriptions.py --limit 80

      - name: Audit published data
        run: |
          python3 scripts/audit_data.py

      - name: Commit catalog updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/cache data/reports data/venues.json
          if git diff --cached --quiet; then
            echo "No catalog changes."
            exit 0
          fi
          git commit -m "chore: refresh open-venue catalog"
          git push
