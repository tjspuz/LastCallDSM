name: Collect Leads

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install optional dependencies
        run: |
          pip install anthropic

      - name: Collect raw leads
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: |
          python3 scripts/collect.py --verify-places

      - name: Apply status lifecycle transitions
        run: |
          python3 scripts/update_statuses.py

      - name: Rebuild verified public timeline
        run: |
          python3 scripts/rebuild_verified_timeline.py

      - name: Enrich venue descriptions
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 scripts/enrich_descriptions.py --limit 40

      - name: Audit published data
        run: |
          python3 scripts/audit_data.py

      - name: Commit updated reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/cache data/reports data/venues.json
          if git diff --cached --quiet; then
            echo "No report changes."
            exit 0
          fi
          git commit -m "chore: refresh leads, statuses, and descriptions"
          git push
