<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Last Call DSM</title>
    <meta
      name="description"
      content="Tracking Des Moines restaurant and bar openings, last calls, closures, relocations, and reopenings."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <header class="masthead">
        <div class="brand-lockup">
          <h1>Last Call DSM</h1>
        </div>
        <p class="masthead-copy">
          Archiving Des Moines area openings, closures, and last calls. 
        </p>
      </header>

      <section class="toolbar" aria-label="Search and filters">
        <label class="toolbar-search" for="search">
          <span class="toolbar-label toolbar-label-desktop">Search</span>
          <input
            id="search"
            class="search-input"
            type="search"
            placeholder="Search by venue, neighborhood, source, or note"
          />
        </label>

        <div class="toolbar-grid">
          <label class="filter-field" for="status-filter">
            <span class="toolbar-label">Status</span>
            <select id="status-filter" class="filter-select">
              <option value="all">All</option>
              <option value="lastcall">Last call</option>
              <option value="closed">Closed</option>
              <option value="opened">Opened</option>
            </select>
          </label>
          <label class="filter-field" for="type-filter">
            <span class="toolbar-label">Type</span>
            <select id="type-filter" class="filter-select">
              <option value="all">All</option>
            </select>
          </label>
          <label class="filter-field" for="area-filter">
            <span class="toolbar-label">Area</span>
            <select id="area-filter" class="filter-select">
              <option value="all">All</option>
            </select>
          </label>
        </div>

        <div class="toolbar-meta">
          <p class="results-copy"><span data-results-count>0 results</span></p>
        </div>
      </section>

      <section id="timeline" class="timeline" aria-live="polite"></section>

      <template id="event-template">
        <article class="tile-card">
          <div class="tile-marker">
            <img class="tile-icon-image" data-field="icon" alt="" aria-hidden="true" />
            <p class="tile-range" data-field="range"></p>
            <p class="tile-category" data-field="type"></p>
          </div>
          <div class="tile-main">
            <p class="tile-kicker" data-field="kicker"></p>
            <h2 class="tile-title">
              <a class="tile-title-link" data-field="name-link" target="_blank" rel="noreferrer">
                <span data-field="name"></span>
              </a>
            </h2>
            <p class="tile-description" data-field="description"></p>
          </div>
        </article>
      </template>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
