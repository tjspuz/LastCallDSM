<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Last Call DSM</title>
    <meta
      name="description"
      content="Tracking Des Moines restaurant and bar openings, closures, relocations, and reopenings."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <header class="masthead">
        <div class="brand-lockup">
          <div class="brand-icon" aria-hidden="true">
            <span class="brand-icon-line"></span>
            <span class="brand-icon-line"></span>
            <span class="brand-icon-line"></span>
          </div>
          <h1>Last Call DSM</h1>
        </div>
        <div class="masthead-meta">
          <p class="eyebrow">Des Moines, Iowa restaurant and bar archive</p>
          <a class="utility-link" href="review.html">Review Queue</a>
        </div>
      </header>

      <section class="toolbar" aria-label="Search and filters">
        <div class="toolbar-row toolbar-row-search">
          <label class="toolbar-search" for="search">
            <span class="toolbar-label">Search</span>
            <input
              id="search"
              class="search-input"
              type="search"
              placeholder="Search by venue, source, neighborhood, or note"
            />
          </label>
          <label class="filter-field filter-field-inline" for="status-filter">
            <span class="toolbar-label">View</span>
            <select id="status-filter" class="filter-select">
              <option value="all">All records</option>
              <option value="closed">Closures</option>
              <option value="opened">Openings</option>
            </select>
          </label>
        </div>
        <div class="toolbar-row toolbar-row-filters">
          <label class="filter-field" for="type-filter">
            <span class="toolbar-label">Type</span>
            <select id="type-filter" class="filter-select">
              <option value="all">All types</option>
            </select>
          </label>
          <label class="filter-field" for="area-filter">
            <span class="toolbar-label">Area</span>
            <select id="area-filter" class="filter-select">
              <option value="all">All areas</option>
            </select>
          </label>
          <label class="filter-field" for="verification-filter">
            <span class="toolbar-label">Verification</span>
            <select id="verification-filter" class="filter-select">
              <option value="all">All records</option>
              <option value="verified">Verified only</option>
              <option value="review">Review only</option>
            </select>
          </label>
          <p class="results-copy">
            <span data-results-count>0 results</span>
          </p>
        </div>
      </section>

      <section class="legend" aria-label="Legend">
        <p>
          Verified records have direct coverage, official statements, or cross-source
          confirmation. Review records stay visible when the history matters but the
          source trail still needs work.
        </p>
      </section>

      <section id="timeline" class="timeline" aria-live="polite"></section>

      <template id="event-template">
        <article class="tile-card">
          <div class="tile-marker">
            <div class="tile-icon" aria-hidden="true">
              <span class="tile-icon-line"></span>
              <span class="tile-icon-line"></span>
              <span class="tile-icon-line"></span>
            </div>
            <p class="tile-range" data-field="range"></p>
            <p class="tile-category" data-field="type"></p>
          </div>
          <div class="tile-main">
            <h2 class="tile-title" data-field="name"></h2>
            <p class="tile-description" data-field="description"></p>
            <div class="tile-footer">
              <span class="badge badge-status" data-field="status"></span>
              <span class="badge badge-verification" data-field="verification"></span>
            </div>
          </div>
        </article>
      </template>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
